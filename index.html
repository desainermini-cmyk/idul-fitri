<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ucapan Idul Fitri Cinematic</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Segoe UI,Arial;
overflow:hidden;
}

/* CINEMA BAR */

.bar{
position:fixed;
left:0;
width:100%;
height:7vh;
background:black;
z-index:20;
}

.bar.top{top:0}
.bar.bottom{bottom:0}

/* INTRO */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:15;
font-size:3em;
letter-spacing:4px;
opacity:1;
transition:opacity 2s;
}

/* SLIDES */

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
opacity:0;
transition:opacity 1.5s;
padding:10vw;
box-sizing:border-box;
}

.active{opacity:1}

.text{
font-size:clamp(20px,3vw,40px);
line-height:1.6;
max-width:900px;
text-shadow:0 0 15px gold;
}

.big{
font-size:clamp(32px,5vw,60px);
font-weight:bold;
}

/* MOON */

.moon{
position:absolute;
top:12%;
right:12%;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#fff,#ddd);
box-shadow:0 0 60px white;
animation:spin 30s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* MOSQUE */

.mosque{
position:absolute;
bottom:0;
width:100%;
}

.mosque svg{
width:100%;
fill:#000;
}

/* PARTICLES */

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:.8;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

/* FIREWORK */

.fire{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
}

</style>
</head>

<body>

<div class="bar top"></div>
<div class="bar bottom"></div>

<div id="intro">IDUL FITRI</div>

<div class="moon"></div>

<div class="mosque">
<svg viewBox="0 0 800 200">
<path d="M0 200 L0 120 L100 120 L100 80 L140 80 L140 120 L200 120 L200 100 L260 100 L260 120 L320 120 L320 80 L360 80 L360 120 L440 120 L440 90 L480 90 L480 120 L560 120 L560 80 L600 80 L600 120 L700 120 L700 100 L760 100 L760 120 L800 120 L800 200 Z"/>
</svg>
</div>

<div id="slides"></div>

<audio id="bgm" loop>
<source src="takbir.mp3">
</audio>

<script>

/* TEXT */

const texts=[

"Ramadan… telah sampai di ujung waktunya.",
"Sebulan penuh kita belajar arti sabar.",
"Belajar menahan lapar…",
"Belajar menahan amarah…",
"Dan belajar mendekat kepada Allah.",
"Setiap doa yang terucap…",
"Setiap air mata yang jatuh…",
"Semoga menjadi saksi kebaikan kita.",
"Sesungguhnya bersama kesulitan ada kemudahan. (QS Al Insyirah 6)",
"Kini hari kemenangan telah tiba.",
"Takbir berkumandang…",
"Menggema di setiap penjuru.",
"MINAL AIDIN WAL FAIZIN",
"MOHON MAAF LAHIR DAN BATIN",
"Maafkan setiap kata yang pernah melukai.",
"Maafkan sikap yang pernah menyakiti.",
"Karena manusia tak luput dari salah.",
"Hendaklah mereka memaafkan dan berlapang dada. (QS An Nur 22)",
"Di hari yang suci ini…",
"Mari kita buka lembaran baru.",
"Dengan hati yang bersih.",
"Semoga amal ibadah kita diterima.",
"Dan dosa kita diampuni.",
"Semoga kebahagiaan menyertai kita.",
"Saya, Muhammad Riduan Mengucapkan..........Selamat Hari Raya Idul Fitri 1447 H"

];

const container=document.getElementById("slides");

texts.forEach((t,i)=>{

let slide=document.createElement("div");
slide.className="slide";
if(i==0)slide.classList.add("active");

let text=document.createElement("div");
text.className="text";

if(i==12||i==13||i==24)text.classList.add("big");

text.dataset.text=t;

slide.appendChild(text);
container.appendChild(slide);

});

let slides=document.querySelectorAll(".slide");
let index=0;

/* SOUND */

function tick(){
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
gain.gain.value=0.03;
osc.frequency.value=1000;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.03);
}

/* TYPE EFFECT */

function typeText(el,text){

return new Promise(resolve=>{

let i=0;

function type(){

if(i<text.length){

el.innerHTML+=text[i];
tick();
i++;

setTimeout(type,80);

}else resolve();

}

type();

});

}

/* CALCULATE DELAY */

function calcDelay(text){

let base=1500;
let perChar=70;

let delay=base+(text.length*perChar);

if(text.includes("QS")) delay+=3000;

return delay;

}

/* SHOW SLIDE */

async function showSlide(i){

slides.forEach(s=>s.classList.remove("active"));

let slide=slides[i];
slide.classList.add("active");

let textEl=slide.querySelector(".text");
textEl.innerHTML="";

await typeText(textEl,textEl.dataset.text);

let delay=calcDelay(textEl.dataset.text);

setTimeout(nextSlide,delay);

}

function nextSlide(){

index++;

if(index>=slides.length){

startFireworks();
return;

}

showSlide(index);

}

/* PARTICLES */

for(let i=0;i<80;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*100+"%";
p.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(p);

}

/* BIG FIREWORK */

function startFireworks(){

for(let i=0;i<120;i++){

let f=document.createElement("div");
f.className="fire";

f.style.left=Math.random()*100+"%";
f.style.top=Math.random()*60+"%";

document.body.appendChild(f);

let x=(Math.random()*400)-200;
let y=(Math.random()*400)-200;

f.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:2000});

setTimeout(()=>f.remove(),2000);

}

}

/* INTRO */

setTimeout(()=>{

document.getElementById("intro").style.opacity=0;

setTimeout(()=>{

document.getElementById("intro").remove();
showSlide(0);

},2000);

},2500);

/* MUSIC */

document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
});

</script>

</body>
</html>
